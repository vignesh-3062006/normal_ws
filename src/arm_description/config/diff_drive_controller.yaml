controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint_1", "left_wheel_joint_2"]
    right_wheel_names: ["right_wheel_joint_1", "right_wheel_joint_2"]

    wheel_separation: 0.5          # distance between left and right wheels
    wheel_radius: 0.075             # wheel radius

    odom_frame_id: "odom"
    base_frame_id: "base_link"

    enable_odom_tf: true
    publish_rate: 40.0

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 2.0
    linear.x.min_velocity: -2.0

    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
