controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["dummy_left_joint_1", "dummy_left_joint_2"]
    right_wheel_names: ["dummy_right_joint_1", "dummy_right_joint_2"]

    wheel_separation: 0.7          # distance between left and right wheels
    wheel_radius: 0.07          # wheel radius

    cmd_vel_topic: /cmd_vel
    odom_topic: /odom

    odom_frame_id: "odom"
    base_frame_id: "base_link"

    enable_odom_tf: true
    publish_wheel_data: true
    publish_rate: 40.0
    use_stamped_vel: true

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 2.0
    linear.x.min_velocity: -2.0

    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0

# Joint State Broadcaster Configuration
joint_state_broadcaster:
  ros__parameters:
    joints:
      - dummy_left_joint_1 # ← Match your URDF joint names
      - dummy_left_joint_2
      - dummy_right_joint_1   # If you have 4 wheels
      - dummy_right_joint_2
